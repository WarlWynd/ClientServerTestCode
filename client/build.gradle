plugins {
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'application'
}

javafx {
    version = "23"
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics']
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':shared')
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    implementation 'ch.qos.logback:logback-classic:1.5.8'
}

application {
    mainClass = 'com.game.client.ClientMain'
    applicationDefaultJvmArgs = [
        '--enable-preview',
        '--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED'
    ]
}

jar {
    archiveBaseName = 'game-client'
    manifest {
        attributes 'Main-Class': 'com.game.client.ClientMain'
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

task jpackageImage(type: Exec, dependsOn: jar) {
    def jpackageExe = "${System.getenv('JAVA_HOME')}/bin/jpackage"
    def outputDir = "${buildDir}/jpackage"

    doFirst {
        file(outputDir).deleteDir()
    }

    commandLine jpackageExe,
        '--type', 'app-image',
        '--input', "${buildDir}/libs",
        '--main-jar', 'game-client.jar',
        '--name', 'MultiplayerGame',
        '--app-version', '1.0.0',
        '--dest', outputDir,
        '--java-options', '--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED'
}

task packageZip(type: Zip, dependsOn: jpackageImage) {
    archiveFileName = 'MultiplayerGame-windows.zip'
    destinationDirectory = file("${buildDir}/dist")
    from "${buildDir}/jpackage/MultiplayerGame"
    into 'MultiplayerGame'
}
