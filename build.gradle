subprojects {
    apply plugin: 'java'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    repositories {
        mavenCentral()
    }

    tasks.withType(JavaCompile).configureEach {
        options.compilerArgs += ['--enable-preview']
        options.release = 25
    }

    tasks.withType(JavaExec).configureEach {
        jvmArgs '--enable-preview'
    }
}
